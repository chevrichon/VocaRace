<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>VocaRace</title>
    <style>
        body {
            background-color: #0f172a;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            justify-content: center;
            display: flex;
            padding-top: 80px;
        }

        .carte {
            background-color: white;
            font-size: large;
            border-radius: 10px;
            display: flex;
            text-align: center;
            border: none;
            align-items: center;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            margin-top: 50px;
            width: 50%;
            height: 430px;
            flex-direction: column;
            border-radius: 2.5rem;
        }

        .reponse {
            background-color: white;
            border-radius: 10px;
            width: 50%;
            height: 50px;
            text-align: center;
            margin: 20px;
            border-color: black;
            border-width: 5px;
            border: none;
        }

        .mot {
            font-size: clamp(.95rem, 4.5vw, 1.875rem);
            font-weight: 1000;
            color: #1e293b;
            font-style: italic;
            text-transform: uppercase;
            text-align: center;
        }

        .valider {
            width: 70%;
            background-color: #4f46e5;
            color: white;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            border-radius: 50px;
            font-size: medium;
            padding-top: 2%;
            padding-bottom: 2%;
            border: none;
            cursor: pointer;
        }

        .message {
            color: black;
        }

        .jeu {
            width: 100%;
            justify-items: center;
            justify-content: center;
            align-items: center;

        }

        .acceuil {
            display: flex;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            width: 100%;
            height: 100%;
            background-color: #0f172a;
            text-transform: uppercase;
        }

        .retour {
            cursor: pointer;
            font-size: small;
            color: gray;
            background-color: white;
            border: none;
        }

        .titre {
            color: white;
            font-weight: 1000;
            font-style: italic;
            font-size: clamp(2.2rem, 8vw, 3.5rem);
            letter-spacing: -.04em;
            text-transform: uppercase;
            text-align: center;
            font-size: 50px;
            margin-top: 5%;
        }

        .solo-icone {
            background-color: #e0e7ff;
            border-radius: 12px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin: 15px;
        }

        .solo-titre {
            color: #1e293b;
            font-weight: 1000;
            font-size: 18px;
            margin: 0;
        }

        .solo-desc {
            color: #64748b;
            font-size: 13px;
            margin-top: 6px;
            margin-bottom: 0;
            font-weight: 400;
        }

        .modedejeu {
            justify-content: center;
            display: flex;
            flex-direction: row;
            width: 70%;
            margin-top: 2%;
        }

        .solo {
            background-color: white;
            border-radius: 20px;
            height: 225px;
            width: 200px;
            cursor: pointer;
            font-weight: 1000;
            padding: 15px;
            justify-content: right;
        }
        .chsolo {
            border-radius: 20px;
            display: inline-block;
            flex-direction: column;
        }
        .level {
            padding: 2%;
            margin: 5%;
            border-radius: 20px;
            cursor: pointer;
            width: 300px;
            height: 50px;
            font-style: italic;
            font-weight: 900;
            text-transform: capitalize;
            color: white;
            justify-content: left;
            text-align: left;
            display: flex;
            flex-direction: column;
        }
        .level-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 50px 50px;
            gap: 25px;
            width: 100%;
        }
        .stsl {
            color: #c3eddf;
            font-size: 12px;
        }
        .level p { 
            margin-left:15px;
            margin-top: 0;
            margin-bottom: 0;
        }
        .level p:not(.stsl) {
            margin-top: 7px;
        }
        .level:hover {
            transform: scale(102%);
            border-width: 4px;
            border-color: #6366ff
        }
    </style>
</head>

<body id="body">
    <div class="chsolo" id="chsolot" style="display:none">
        <h1 style="color: white; text-transform: uppercase; font-style: italic; font-weight: 900; text-align: center;">Nivel de entrenamiento</h1>
        <div class="level-grid">
            <div  class="level" role="button" onclick="lancersolo(1)" style= "background-color: #10b981;">
                <p>Débutant</p>
                <p class="stsl">aide+</p>
            </div>
            <div class="level" role="button" onclick="lancersolo(2)" style="background-color: #6366f1;">
                <p>Intermédiare</p>
                <p class="stsl">aide</p>
            </div>
            <div role="button" class="level" onclick="lancersolo(3)" style="background-color: #a855f7;">
                <p>Expert</p>
                <p class="stsl">sans aide</p>
            </div>
            <div role="button" class="level" onclick="lancersolo(4)" style="background-color: #e11d48; color: white;">
                <p>Hardcore</p>
                <p class="stsl">....</p>
            </div>
        </div>
        <button onclick="acceuil()" style="color: #808080; font-weight: 900; font-size: 12px; border: none; background-color: #0f172a; width: 35px ; align-self: center; border-radius: 25px; margin-top: 40px; cursor: pointer; ">Retour</button>
    </div>
    <div class="acceuil" id="acceuil" style="display: flex">
        <h2 class="titre">VocaRace</h2>
        <h3 class="soustitre" style="color: #94a3b8; font-size: medium; font-weight: 1000; margin-top: -25px">
            Maîtrisez l'orthographe espagnole</h3>
        <div class="modedejeu">
            <div role="button" class="solo" onclick="chsolo()">
                <div class="solo-icone">👤</div>
                <p class="solo-titre">Entraînement solo</p>
                <p class="solo-desc" style="text-transform: none;">Pratiquez à votre rythme</p>
                <p style="color:#6366f1; font-size: 12px">choisir le niveau →</p>
            </div>
        </div>
    </div>
    <div class="jeu" style="display: none" id="jeu">
        <div class="carte">
            <p class="mot" id="mot">Mot à écrire</p>
            <!--<input class="reponse" id="reponse" type="text" placeholder="Ecrit la traduction en espagnol">-->
            <div id="reponse">
            </div>
            <button class="valider" id="valider" onclick="boutonvalider()">Valider la réponse</button>
            <p class="message" id="message"></p>
            <p class="score" id="score">Score : 0</p>
            <p id="level">difficultée : </p>
            <button class="retour" id="retour" onclick="acceuil()">Retour</button>
        </div>
    </div>
</body>
<script>
    const difficultée = ["Débutant","Intermédiare","Expert","Hardcore"]
    const vocabulaire = [
        { fr: "le chien", es: "el perro" },
        { fr: "la maison", es: "la casa" },
        { fr: "le chat", es: "el gato" },
    ]
    let index
    let score
    let mot
    let reponse
    let bonnerep
    let listelistes
    let level
    let lettre
    vocabulaire.sort(() => Math.random() - 0.5)
    function finsolo() {
        document.getElementById("message").textContent = "liste terminée"
    }
    function chsolo() {
        document.getElementById("jeu").style.display = "none"
        document.getElementById("acceuil").style.display = "none"
        document.getElementById("body").style.backgroundColor = "#0f172a"
        document.getElementById("chsolot").style.display = "flex"
    }
    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
    function acceuil() {
        document.getElementById("jeu").style.display = "none"
        document.getElementById("acceuil").style.display = "flex"
        document.getElementById("body").style.backgroundColor = "#0f172a"
        document.getElementById("chsolot").style.display = "none"
    }
    function lancersolo(u) {
        index = 0
        score = 1
        level = u
        document.getElementById("level").textContent = ("difficultée : " + difficultée[level - 1])
        document.getElementById("acceuil").style.display = "none"
        document.getElementById("jeu").style.display = "flex"
        document.getElementById("chsolot").style.display = "none"
        document.getElementById("body").style.backgroundColor = "white"
        mot = vocabulaire[index]
        affichermot()
    }
    function motsuivant() {
        index = index + 1
        console.log(index)

        if (index >= vocabulaire.length) {
            finsolo()
            return
        }
        mot = vocabulaire[index]
    }
    function boutonvalider() {
        if (index < vocabulaire.length) {
            const cases = document.querySelectorAll(".case-lettre")
            let ok = true
            cases.forEach(casel=>{
                if (casel.value.toLowerCase() !== casel.dataset.correct.toLowerCase() && casel.dataset.correct !== " ") {
                    ok = false
                    casel.style.borderColor = "red"
                }
                else {
                    casel.style.borderColor = "green"
                }
            })
            if (ok) {
                motsuivant()
                affichermot()
                score = score + 1
                document.getElementById("lettre").style.border = "outset"
                document.getElementById("lettre").style.borderColor = "green"
                document.getElementById("score").textContent = "Score : " + score
                sleep(600).then(() => document.getElementById("lettre").style.border = "none")
            }

            else {
                document.getElementById("lettre").style.border = "outset"
                document.getElementById("lettre").style.borderColor = "red"
                console.log(mot.es)
                sleep(600).then(() => document.getElementById("lettre").style.border = "none")
            }
        }
    }
    function affichermot() {
        lettre = mot.es.length
        document.getElementById("reponse").innerHTML = ""
        document.getElementById("mot").textContent = mot.fr
        for (const lettre of mot.es ) {
            if (lettre == " ") {
                const casel = document.createElement("div")
                casel.style.display = "inline-block"
                casel.style.backgroundColor = "white"
                casel.style.color = "white"
                casel.style.width = "40px"
                casel.style.height = "55px"
                casel.style.border = "none"
                casel.style.marginRight = "10px"
                casel.style.marginBottom = "15px"
                document.getElementById("reponse").appendChild(casel)
                casel.className = "case-espace"
            }
            else {
                const casel = document.createElement("input")
                casel.style.display = "inline-block"
                casel.style.backgroundColor = "white"
                casel.style.width = "40px"
                casel.style.height = "55px"
                casel.maxLength = "1"
                casel.style.textTransform = "Uppercase"
                casel.style.fontWeight = "900"
                casel.style.fontSize = "20px"
                casel.style.textAlign = "center"
                casel.style.marginRight = "10px"
                casel.style.marginBottom = "15px"
                casel.style.borderRadius = "15px"
                casel.id = "lettre"
                document.getElementById("reponse").appendChild(casel)
                casel.dataset.correct = lettre
                casel.className = "case-lettre"
                casel.addEventListener("input", function(){
                  if (this.value) {
                        let suivant = this.nextElementSibling
                        while (suivant && suivant.tagName !== "INPUT"){
                            suivant = suivant.nextElementSibling
                        }
                        if (suivant && suivant.tagName === "INPUT") {
                            suivant.focus()
                    }
                }
            })
            casel.addEventListener("keydown", function(event) {
                if (event.key == "Backspace") {
                    let precedent = this.previousElementSibling
                    while (precedent && precedent.tagName !== "INPUT"){
                        precedent = precedent.previousElementSibling
                    }
                if(!this.value) {precedent.focus();event.preventDefault()}
                this.value = ""
                }
            })
            }

        }
        const prcase = document.querySelector(".case-lettre")
        prcase.focus()
    }
    document.getElementById("reponse").addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
            boutonvalider()
        }
    })
    async function chargerliste() {
        const reponsef = await fetch("https://raw.githubusercontent.com/chevrichon/VocaRace/refs/heads/main/lists.json")
        listelistes = await reponsef.json()
        console.log(listelistes)


    }
    acceuil()
</script>
